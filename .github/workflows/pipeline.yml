name: Vision One Million — Weekly Pipeline Run

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "vision-one-million-scorecard"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python main.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-db
          path: data/scorecard.db
          retention-days: 90

      - name: Commit updated database
        run: |
          git config user.email "pipeline@github-actions.com"
          git config user.name "GitHub Actions"
          git add data/scorecard.db
          git diff --staged --quiet || git commit -m "chore: update scorecard.db [$(date -u '+%Y-%m-%d')]"
          git push